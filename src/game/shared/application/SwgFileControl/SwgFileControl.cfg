# ======================================================================
# SwgFileControl Configuration
#
# Server mode: requires [SwgFileControl] section
# Client mode: requires [ClientGame] section
# ======================================================================

# ----------------------------------------------------------------------
# Server Configuration
# Uncomment this section to run in server mode.
# ----------------------------------------------------------------------

#[SwgFileControl]
#host=0.0.0.0
#port=44411
#channel=live
#maxSendSize=1073741824
#allowUpdates=true
#maxBufferSizes=65536
#fileServerKey=changeme
#fileServerAllowUpdates=true
#fileServerMaxConnections=32
#rateLimitKBps=40000
#logLevel=1
#enableCompression=true
#blacklistUploadPaths=
#blacklistSendPaths=
#whitelistExtensions=.iff;.class;.cdf;.sht;.trn;.ws;.msh;.lod;.pob;.apt;.sat;.skt;.lmg;.mgn;.ans;.ash;.lsb;.stf
#backupBeforeReload=true
#disableReload=false
#antBuildPath=/home/swg/swg-main

# ----------------------------------------------------------------------
# Client Configuration
# Used when running client commands (--update-file, --download-file, etc.)
# ----------------------------------------------------------------------

[ClientGame]
clientHost=test.swgtitan.org
clientPort=1527
clientFileServerKey=bubbaBeKeying
autoReload=true
verifyChecksum=true
clientEnableCompression=true
